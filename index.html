<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Neosapien · MCP Guide</title>
  <meta name="description" content="Connect your Neosapien memories to ChatGPT, Claude or any AI over MCP. A step-by-step setup guide." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#070707" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MCP Guide" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="icon" href="assets/icons/icon-192.png" />

  <link rel="preload" href="assets/fonts/worksans-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/styles.css?v=7" />
</head>
<body>
  <div id="app" class="screen">
    <!-- Top bar (status + back) -->
    <header class="topbar" id="topbar">
      <button class="back" id="backBtn" type="button" aria-label="Go back" hidden>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Back</span>
      </button>
      <span class="appbar-title" id="appbarTitle"></span>
    </header>

    <main id="view" class="view" aria-live="polite"></main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="js/app.js?v=7" type="module"></script>

</html>
